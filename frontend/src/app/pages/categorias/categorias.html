<h1>
  Categorias
</h1>

<form [formGroup]="form">

  <input
    type="text"
    formControlName="nome"
    placeholder="Nome"
  >

  <input
    type="text"
    formControlName="descricao"
    placeholder="Descricao"
  >

  <button
    type="button"
    (click)="salvar()"
  >
    Salvar
  </button>

</form>

<hr>

<div *ngFor="let categoria of categorias">

  <h3>
    {{ categoria.nome }}
  </h3>

  <p>
    {{ categoria.descricao }}
  </p>

  <button
    (click)="deletar(categoria.id)"
  >
    Excluir
  </button>

</div>
